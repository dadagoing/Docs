<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>个人知识库 | 技术·生活·成长</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <!-- 引入 manifest.json 配置 -->
  <link rel="manifest" href="/Docs/manifest.json">
  <!-- 适配移动端/桌面端主题色 -->
  <meta name="theme-color" content="#42b983">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">

  <!-- 主题 & 代码高亮 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css">

  <style>
    #app {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      z-index: 9999;
      font-size: 16px;
      color: #666;
    }
    [data-theme="dark"] #app {
      background: #1e1e1e;
      color: #ccc;
    }
  </style>
</head>

<body>
<div id="app">正在加载个人知识库…</div>

<script>
  window.$docsify = {
    name: '个人知识库',
    repo: 'https://github.com/dadagoing/Docs',
    loadSidebar: true,
    loadNavbar: true,
    coverpage: true,
    maxLevel: 4,
    subMaxLevel: 3,
    mergeNavbar: true,
    auto2top: true,
    homepage: 'README.md',
    notFoundPage: '404.md',

    // 搜索
    search: {
      maxAge: 86400000,
      paths: 'auto',
      placeholder: '搜索笔记、技能、感悟…',
      noData: '未找到相关内容',
      depth: 4
    },

    // 分页
    pagination: {
      previousText: '上一篇',
      nextText: '下一篇',
      crossChapter: true
    }
  }
</script>

<!-- 核心库 -->
<script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

<!-- 代码语法支持（全语言通用） -->
<script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-java.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-python.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-bash.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-sql.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-yaml.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-markdown.min.js"></script>
</body>
</html>
