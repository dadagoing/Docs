<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>个人知识库 | 技术·生活·成长</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <!-- 保留你指定的绝对路径 -->
  <link rel="manifest" href="https://raw.githubusercontent.com/dadagoing/Docs/main/manifest.json">
  <!-- 适配移动端/桌面端主题色 -->
  <meta name="theme-color" content="#42b983">
  <link rel="icon" href="/Docs/favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="/Docs/favicon.ico" type="image/x-icon">

  <!-- 核心样式（锁定版本） -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4.13.1/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.css">

  <!-- 新增：进度条样式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-progress@1.0.3/dist/progress.min.css">
  <!-- 新增：目录折叠样式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse@1.0.1/dist/sidebar-collapse.min.css">

  <style>
    /* 原有优化样式保留 */
    #app {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 9999;
      font-size: 18px;
      color: #42b983;
      font-family: "Microsoft YaHei", sans-serif;
    }
    [data-theme="dark"] #app {
      background: #1e1e1e;
      color: #61afef;
    }
    html { scroll-behavior: smooth; }
    .docsify-pagination-container { padding: 0 10px; }
    pre[class*="language-"] { border-radius: 8px; padding: 15px !important; }

    /* 新增：回到顶部按钮样式 */
    .back-to-top {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #42b983;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 999;
    }
    .back-to-top.show { opacity: 1; }
    [data-theme="dark"] .back-to-top { background: #61afef; }

    /* 新增：复制代码成功提示样式 */
    .copy-code-success {
      background: #42b983 !important;
      color: white !important;
      font-size: 14px !important;
      padding: 2px 8px !important;
      border-radius: 4px !important;
    }

    /* 新增：锚点导航样式优化 */
    .anchor-link {
      opacity: 0;
      transition: opacity 0.2s;
      margin-left: 8px;
      color: #999;
    }
    h1:hover .anchor-link, h2:hover .anchor-link, h3:hover .anchor-link {
      opacity: 1;
    }
    [data-theme="dark"] .anchor-link { color: #ccc; }
  </style>
</head>

<body>
<div id="app">
  <div style="text-align: center;">
    <div style="font-size: 24px; margin-bottom: 10px;">📚 个人知识库</div>
    <div>正在加载中... 请稍候</div>
  </div>
</div>

<!-- 新增：回到顶部按钮 -->
<div class="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</div>

<script>
  window.$docsify = {
    // 原有核心配置保留
    name: '个人知识库',
    repo: 'https://github.com/dadagoing/Docs',
    loadSidebar: true,
    loadNavbar: true,
    coverpage: true,
    maxLevel: 4,
    subMaxLevel: 3,
    mergeNavbar: true,
    auto2top: true,
    homepage: 'README.md',
    notFoundPage: '404.md',

    // 原有优化配置保留
    search: {
      maxAge: 86400000,
      paths: 'auto',
      placeholder: '🔍 搜索笔记、技能、感悟…',
      noData: '😯 未找到相关内容',
      depth: 4,
      hideOtherSidebarContent: false,
      namespace: 'docsify-search'
    },
    pagination: {
      previousText: '← 上一篇',
      nextText: '下一篇 →',
      crossChapter: true,
      crossChapterText: true
    },
    darkmode: {
      enable: true,
      defaultTheme: 'light',
      autoDarkMode: 'auto',
      toggle: true
    },
    loadFailMessage: '😵 加载失败，请刷新页面重试',
    zoomImage: {
      margin: 10,
      background: '#fff',
      zIndex: 99999
    },

    // 新增功能1：代码行号显示
    lineNumbers: true,
    // 新增功能2：目录自动折叠（默认折叠二级以上）
    collapse: {
      default: 1, // 0=全部展开，1=折叠二级及以上，2=折叠三级及以上
      toggle: true // 显示折叠/展开按钮
    },
    // 新增功能3：锚点导航（标题自动生成锚点）
    anchorjs: {
      placement: 'right',
      visible: 'hover',
      icon: '#'
    },
    // 新增功能4：自定义404页面文案
    notFoundPage: {
      '/': '_404.md',
      '/zh-cn/': '_404.md'
    },
    // 新增功能5：图片懒加载
    lazyLoad: {
      enable: true,
      delay: 300,
      placeholder: 'https://cdn.jsdelivr.net/npm/docsify/lib/assets/loading.gif'
    },
    // 新增功能6：快捷键配置
    shortcuts: {
      'toggleSidebar': 'alt+s', // 切换侧边栏
      'toggleDarkMode': 'alt+d', // 切换暗黑模式
      'search': 'alt+f' // 聚焦搜索框
    }
  }

  // 新增：回到顶部按钮逻辑
  window.addEventListener('scroll', () => {
    const backToTop = document.querySelector('.back-to-top');
    if (window.scrollY > 300) {
      backToTop.classList.add('show');
    } else {
      backToTop.classList.remove('show');
    }
  });

  // 新增：复制代码成功提示
  document.addEventListener('copy-code-success', (e) => {
    const target = e.target;
    const tip = document.createElement('div');
    tip.className = 'copy-code-success';
    tip.textContent = '复制成功 ✅';
    tip.style.position = 'absolute';
    tip.style.top = '10px';
    tip.style.right = '10px';
    target.appendChild(tip);
    setTimeout(() => tip.remove(), 2000);
  });
</script>

<!-- 原有核心库保留 -->
<script src="//cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/emoji.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/zoom-image.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/search.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2.1.1/dist/docsify-copy-code.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify-pagination@2.3.0/dist/docsify-pagination.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify-darkmode@0.8.1/dist/docsify-darkmode.min.js"></script>

<!-- 新增功能库 -->
<script src="//cdn.jsdelivr.net/npm/docsify-progress@1.0.3/dist/progress.min.js"></script> <!-- 进度条 -->
<script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse@1.0.1/dist/sidebar-collapse.min.js"></script> <!-- 目录折叠 -->
<script src="//cdn.jsdelivr.net/npm/docsify-line-numbers@1.0.4/dist/docsify-line-numbers.min.js"></script> <!-- 代码行号 -->
<script src="//cdn.jsdelivr.net/npm/docsify-anchorjs@1.1.2/dist/docsify-anchorjs.min.js"></script> <!-- 锚点导航 -->
<script src="//cdn.jsdelivr.net/npm/docsify-lazyload@1.0.3/dist/docsify-lazyload.min.js"></script> <!-- 图片懒加载 -->
<script src="//cdn.jsdelivr.net/npm/docsify-shortcuts@1.0.0/dist/docsify-shortcuts.min.js"></script> <!-- 快捷键 -->

<!-- 代码语法支持（原有+补充） -->
<script src="//cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-yaml.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markdown.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-go.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cpp.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-vue.min.js"></script>

<!-- 原有Service Worker + 加载逻辑保留 -->
<script>
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/Docs/sw.js')
              .then(registration => console.log('✅ Service Worker 注册成功：', registration.scope))
              .catch(error => console.log('❌ Service Worker 注册失败：', error));
    });
  }
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      const app = document.getElementById('app');
      if (app && app.textContent.includes('正在加载中')) app.style.display = 'none';
    }, 3000);
  });
</script>
</body>
</html>
